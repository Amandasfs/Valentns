name: Deploy Valentines Checker

on:
  push:
    branches: ["main"] # Altere para "master" se sua branch principal tiver esse nome

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Ou a versão que você usa no seu projeto

      - name: Install dependencies
        run: |
          cd valentines-checker
          npm install

      - name: Build
        run: |
          cd valentines-checker
          npm run build # Certifique-se de que este comando gera a pasta 'dist'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANTE: Aponte para a pasta dist DENTRO da subpasta
          path: 'valentines-checker/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
